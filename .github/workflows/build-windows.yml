name: Build Windows Installers

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "要创建并推送的标签（例如 v0.2.0）"
        required: true
        type: string
      prerelease:
        description: "是否标记为预发布"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-windows:
    name: Build on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (MSI + NSIS)
        run: npm run build

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      - name: Upload raw executable
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/finance-dashboard.exe
          if-no-files-found: warn

      - name: Create and push tag
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "tag_name 不能为空"
          }

          if ($tag -notmatch '^v?\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            throw "tag_name 格式无效: $tag（示例: v0.2.0）"
          }

          $exists = git ls-remote --tags origin "refs/tags/$tag"
          if ($exists) {
            throw "远端标签已存在: $tag"
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          Write-Host "Tag pushed: $tag"

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/finance-dashboard.exe
